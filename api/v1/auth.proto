syntax = "proto3";

package api.v1;

option go_package = "github.com/cosmo-services/grpc-contracts/gen/api/v1";

// Auth Service
service AuthService {
  // Get user data by id  
  rpc GetUserById(GetUserByIdRequest) returns (GetUserResponse);
  // Get user data by username
  rpc GetUserByusername(GetUserByUsernameRequest) returns (GetUserResponse);
}

message GetUserByIdRequest {
  string user_id = 1;
}

message GetUserByUsernameRequest {
  string username = 1;
}

message GetUserResponse {
  UserData user = 1;
}

message UserData {
  string id         = 1;
  string email      = 2;
  string username   = 3;
  bool   is_active  = 4;
  int64  created_at = 5;
}